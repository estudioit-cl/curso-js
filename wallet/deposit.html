<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Realizar Depósito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root {
      --c-bg:      #0d0f14;
      --c-panel:   #13161f;
      --c-border:  #1e2330;
      --c-accent:  #6c63ff;
      --c-accent2: #a78bfa;
      --c-text:    #e8eaf0;
      --c-muted:   #7b82a0;
      --c-green:   #34d399;
    }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--c-bg);
      font-family: 'Inter', sans-serif;
      color: var(--c-text);
      padding: 1.75rem 2rem;
      min-height: 100vh;
    }

    .page-header { margin-bottom: 1.75rem; }
    .page-header h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: .2rem; }
    .page-header p  { font-size: .85rem; color: var(--c-muted); }

    .form-card {
      background: var(--c-panel);
      border: 1px solid var(--c-border);
      border-radius: 14px;
      padding: 2rem;
      max-width: 480px;
    }

    label {
      display: block;
      font-size: .75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--c-muted);
      margin-bottom: .45rem;
    }

    .input-wrap {
      position: relative; margin-bottom: 1.4rem;
    }
    .input-wrap .prefix {
      position: absolute; left: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: .9rem; color: var(--c-muted);
      font-weight: 600; pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 9px;
      color: var(--c-text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: .8rem 1rem .8rem 2.5rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus {
      border-color: var(--c-accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.18);
    }
    .input-wrap input::placeholder { color: var(--c-border); }

    .quick-amounts {
      display: flex; gap: .5rem; flex-wrap: wrap;
      margin-bottom: 1.4rem;
    }
    .quick-btn {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 7px;
      color: var(--c-muted);
      font-size: .82rem; font-weight: 500;
      padding: .35rem .8rem;
      cursor: pointer;
      transition: all .15s;
    }
    .quick-btn:hover {
      border-color: var(--c-accent);
      color: var(--c-accent2);
    }

    .btn-action {
      width: 100%;
      background: linear-gradient(135deg, var(--c-accent), var(--c-accent2));
      border: none; border-radius: 9px;
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: .95rem; font-weight: 600;
      padding: .82rem 1rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn-action:hover { opacity: .9; transform: translateY(-1px); }
    .btn-action:active { transform: translateY(0); }

    #success-msg {
      display: none;
      margin-top: 1rem;
      background: rgba(52,211,153,.1);
      border: 1px solid rgba(52,211,153,.3);
      color: var(--c-green);
      border-radius: 9px;
      font-size: .875rem; font-weight: 500;
      padding: .75rem 1rem;
      text-align: center;
    }
    #success-msg.show { display: block; }

    #error-msg {
      display: none;
      margin-top: 1rem;
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      color: #f87171;
      border-radius: 9px;
      font-size: .875rem;
      padding: .65rem 1rem;
      text-align: center;
    }
    #error-msg.show { display: block; }

    .info-note {
      margin-top: 1.25rem;
      padding: .75rem 1rem;
      background: rgba(108,99,255,.07);
      border: 1px solid rgba(108,99,255,.18);
      border-radius: 9px;
      font-size: .8rem; color: var(--c-muted);
    }
    .info-note i { color: var(--c-accent2); }
  </style>
</head>
<body>

<div class="page-header">
  <h2><i class="bi bi-plus-circle me-2" style="color:var(--c-accent2)"></i>Realizar Depósito</h2>
  <p>Agrega fondos a tu billetera</p>
</div>

<div class="form-card">
  <label for="send_deposit">Monto a depositar</label>
  <div class="input-wrap">
    <span class="prefix">$</span>
    <input type="number" id="send_deposit" name="send_deposit" placeholder="0" min="1"/>
  </div>

  <div style="margin-bottom:.45rem; font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--c-muted);">Montos rápidos</div>
  <div class="quick-amounts">
    <button class="quick-btn" onclick="setAmount(5000)">$5.000</button>
    <button class="quick-btn" onclick="setAmount(10000)">$10.000</button>
    <button class="quick-btn" onclick="setAmount(25000)">$25.000</button>
    <button class="quick-btn" onclick="setAmount(50000)">$50.000</button>
    <button class="quick-btn" onclick="setAmount(100000)">$100.000</button>
  </div>

  <button class="btn-action" id="btn-deposit">
    <i class="bi bi-check-circle me-2"></i>Confirmar Depósito
  </button>

  <div id="success-msg">
    <i class="bi bi-check-circle-fill me-2"></i>¡Depósito realizado con éxito!
  </div>
  <div id="error-msg">
    <i class="bi bi-exclamation-circle me-1"></i>Ingresa un monto válido mayor a 0
  </div>

  <div class="info-note">
    <i class="bi bi-info-circle me-1"></i>
    El saldo se actualizará de forma inmediata en tu billetera.
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
<script>
  function setAmount(val) {
    $('#send_deposit').val(val);
    $('#error-msg').removeClass('show');
    $('#success-msg').removeClass('show');
  }

  $('#btn-deposit').on('click', function() {
    const monto = parseFloat($('#send_deposit').val());
    $('#success-msg').removeClass('show');
    $('#error-msg').removeClass('show');

    if (!monto || monto <= 0) {
      $('#error-msg').addClass('show');
      return;
    }

    agregarTransaccion('deposito', monto, '');
    $('#success-msg').addClass('show');
    $('#send_deposit').val('');

    // Notificar al padre
    if (window.parent && window.parent !== window) {
      window.parent.postMessage('refresh-balance', '*');
    }
  });

  $('#send_deposit').on('input', function() {
    $('#error-msg').removeClass('show');
    $('#success-msg').removeClass('show');
  });
</script>
</body>
</html>
